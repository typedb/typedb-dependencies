[package]
name = "typedb-dependencies"
version = "0.0.0"

[lib]
path = "" # ignored by cargo generate-lockfile

[dependencies]
async-trait = "0.1.59"
axum = { version = "0.7.9", features = ["ws"] }
axum-extra = { version = "0.9.6", features = ["typed-header"] }
axum-server = { version = "0.7.3", features = ["tls-rustls-no-provider"] }
base64 = "0.22.1"
bincode = "1.3.3"
bytes = "1.11.1"
chrono = "0.4.44"
chrono-tz = { version = "0.9.0", features = ["case-insensitive"] }
clap = "4.0.26"
crc32fast = "1.5.0"
crossbeam = "0.8.2"
cxx = "1.0.59"
erased-serde = "0.4.9"
futures = { version = "0.3.30", features = ["executor", "thread-pool"] }
glob = "0.3.2"
home = "0.5.11"
http = "1.1.0"
hyper = { version = "0.14.32", features = ["full"] }
hyper-rustls = "0.25.0"
itertools = "0.14.0"
jsonwebtoken = "9.3.1"
lz4 = "1.24.0"
macro_rules_attribute = "0.2.0"
maybe-async = "0.2.7"
moka = { version = "0.12.8" , features = ["sync"] }
paste = "1.0.15"
pest = "2.7.4"
pest_derive = "2.7.4"
pprof = { version = "0.13.0", features = ["flamegraph", "criterion"] }
proc-macro2 = "1.0.83"
protobuf = "2.28.0"
prost = "0.13"
pwhash = "1.0.0"
raft = "0.7.0"
rand = "0.8.5"
regex = "1.6.0"
rocksdb = { version = "0.23.0", features = ["lz4", "bindgen-runtime"], default-features = false }
rpassword = "7.3.1"
rustls-pemfile = "2.2.0"
rustyline= { version = "15.0.0", features = ["with-file-history", "custom-bindings"], default-features = false }
same-file = "1.0.6"
seahash = "4.1.0"
sentry = { version = "0.36.0", features = ["ureq", "rustls", "backtrace", "panic", "contexts"], default-features = false }
serde = { version = "1.0.228", features = ["rc"] }
serde_json = "1.0.138"
serde_with = "3.12.0"
serde_yaml2 = "0.1.2"
sha2 = "0.10.6"
slog = "2.7.0"
slog-async = "2.8.0"
slog-term = "2.9.2"
smallvec = "1.15.0"
syn = "2.0.66"
sysinfo = "0.33.0"
tempdir = "0.3.7"
tokio = { version = "1.52.1", features = ["rt", "rt-multi-thread", "signal"] }
tokio-rustls = { version = "0.26.2", features = ["ring"], default-features = false }
tokio-stream = "0.1.11"
tokio-test = "0.4.4"
tokio-util = { version = "0.7.16", features = ["rt"] }
tonic = { version = "0.12", features = ["tls", "tls-roots"] }
tonic-build = "0.12"
tonic-types = "0.12"
tower = "0.4.13"
tower-http = { version = "0.6.2", features = ["cors"] }
tracing = "0.1.37"
tracing-appender = "0.2.3"
tracing-subscriber = { version = "0.3.16", features = ["env-filter"] }
unicase = { version = "2.8.1" }
ureq = { version = "2.12.1", features = ["tls"]}
url = "2.5.4"
uuid = { version = "1.1.2", features = ["fast-rng", "v4"] }
xxhash-rust = { version = "0.8.12", features = ["xxh3"] }
yaml-rust2 = "0.10.1"

[dev-dependencies]
async-std = { version = "1.12.0", features = ["attributes"] }
cbindgen = "0.29"
criterion = "0.5.1"
cucumber = "0.19.1"
rand_core = "0.3.1"
serial_test = "0.9.0"
smol = "1.3.0"
xoshiro = "0.0.5"
